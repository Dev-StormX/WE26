
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>رابط مختصر - شاهد الإعلان واستمر</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Monetag SDK - الطريقة الصحيحة -->
    <script src="https://libtl.com/sdk.js" data-zone="10892924" data-sdk="show_10892924"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 30px 20px;
            margin: 20px 0;
        }
        .loading {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-hint-color, #ccc);
            border-top: 4px solid var(--tg-theme-button-color, #3390ec);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { font-size: 18px; margin: 20px 0; color: var(--tg-theme-text-color, #000000); }
        .hint { font-size: 14px; color: var(--tg-theme-hint-color, #8e8e8e); margin-top: 10px; }
        .button {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .button:active { opacity: 0.8; }
        .retry-btn { background: #ff3b30; margin-top: 15px; }
        .success-box {
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid #34c759;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }
        .error-box {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid #ff3b30;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }
        .ad-badge {
            background: #ff3b30;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .info-text {
            background: rgba(51, 144, 236, 0.1);
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            color: var(--tg-theme-hint-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="waitingBox">
            <div class="ad-badge">⭐ إعلان مطلوب للمتابعة ⭐</div>
            <div class="loading" id="spinner"></div>
            <div class="message" id="message">🔍 جاري تجهيز الإعلان...</div>
            <div class="hint" id="hint">
                ⏱️ سيظهر زر الإغلاق بعد 15 ثانية - يرجى الانتظار
            </div>
            <div class="info-text">
                💡 ملاحظة: زر الإغلاق "✖" يظهر تلقائياً بعد 15 ثانية من مشاهدة الإعلان
            </div>
        </div>

        <div class="success-box" id="successBox">
            ✅ تم مشاهدة الإعلان بنجاح!<br>
            <small>جاري التحويل...</small>
        </div>

        <div class="error-box" id="errorBox">
            ❌ لم يتم مشاهدة الإعلان بالكامل<br>
            <small>يجب مشاهدة الإعلان حتى النهاية (15 ثانية) ليتم التحويل</small>
            <button class="button retry-btn" id="retryBtn">🔄 إعادة المحاولة</button>
        </div>

        <button class="button" id="manualBtn" style="display: none;">⚠️ تحويل مباشر (بدون إعلان)</button>
    </div>

    <script>
        // تهيئة Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        // رابط التحويل النهائي - غيّره إلى رابطك
        const TARGET_URL = "https://t.me/YourChannel";
        
        // المتغيرات
        let adCompleted = false;
        let redirectAttempted = false;
        const ZONE_ID = '10892924';
        
        // العناصر
        const waitingBox = document.getElementById('waitingBox');
        const successBox = document.getElementById('successBox');
        const errorBox = document.getElementById('errorBox');
        const messageEl = document.getElementById('message');
        const hintEl = document.getElementById('hint');
        const spinner = document.getElementById('spinner');
        const retryBtn = document.getElementById('retryBtn');
        const manualBtn = document.getElementById('manualBtn');
        
        // التحقق من وجود دالة الإعلان
        function isAdAvailable() {
            return typeof window[`show_${ZONE_ID}`] === 'function';
        }
        
        // عرض الإعلان بالطريقة الصحيحة حسب وثائق Monetag
        function showAd() {
            if (!isAdAvailable()) {
                messageEl.innerHTML = "⚠️ الإعلان غير متوفر حالياً";
                hintEl.innerHTML = "سيتم التحويل خلال 3 ثوانٍ";
                setTimeout(() => redirectToTarget(), 3000);
                return;
            }
            
            messageEl.innerHTML = "📺 جاري تشغيل الإعلان...";
            hintEl.innerHTML = "⏱️ انتظر 15 ثانية حتى يظهر زر الإغلاق";
            
            // استدعاء الإعلان بالطريقة الصحيحة مع معالجة الأخطاء
            // استخدام catchIfNoFeed للتعامل مع حالة عدم وجود إعلانات
            const adFunction = window[`show_${ZONE_ID}`];
            
            // محاولة عرض الإعلان مع معاملات إضافية للتحكم بشكل أفضل
            adFunction({ 
                catchIfNoFeed: true,
                requestVar: 'redirect_app'
            })
            .then((result) => {
                // تم مشاهدة الإعلان بنجاح
                console.log('Ad completed:', result);
                adCompleted = true;
                
                // إخفاء واجهة الانتظار وإظهار النجاح
                spinner.style.display = 'none';
                waitingBox.style.display = 'none';
                successBox.style.display = 'block';
                
                // إرسال بيانات إلى البوت
                tg.sendData(JSON.stringify({
                    action: 'ad_watched',
                    timestamp: Date.now(),
                    zone: ZONE_ID,
                    reward_event_type: result?.reward_event_type || 'valued'
                }));
                
                // التحويل بعد ثانية
                setTimeout(() => redirectToTarget(), 1000);
            })
            .catch((error) => {
                // فشل الإعلان أو أغلقه المستخدم قبل 15 ثانية
                console.error('Ad error:', error);
                showErrorAndRetry();
            });
        }
        
        function showErrorAndRetry() {
            waitingBox.style.display = 'none';
            errorBox.style.display = 'block';
        }
        
        function redirectToTarget() {
            if (redirectAttempted) return;
            redirectAttempted = true;
            
            tg.sendData(JSON.stringify({
                action: 'redirect',
                timestamp: Date.now(),
                ad_completed: adCompleted
            }));
            
            window.location.href = TARGET_URL;
        }
        
        function retryAd() {
            adCompleted = false;
            redirectAttempted = false;
            errorBox.style.display = 'none';
            waitingBox.style.display = 'block';
            successBox.style.display = 'none';
            spinner.style.display = 'block';
            messageEl.innerHTML = "🔄 جاري إعادة تجهيز الإعلان...";
            hintEl.innerHTML = "⏱️ سيظهر زر الإغلاق بعد 15 ثانية - يرجى الانتظار";
            setTimeout(() => showAd(), 500);
        }
        
        // زر إعادة المحاولة
        retryBtn.addEventListener('click', retryAd);
        
        // زر التحويل المباشر كحل أخير (يظهر بعد 30 ثانية)
        setTimeout(() => {
            if (!adCompleted && !redirectAttempted) {
                manualBtn.style.display = 'block';
            }
        }, 30000);
        
        manualBtn.addEventListener('click', () => {
            if (!redirectAttempted) redirectToTarget();
        });
        
        // بدء التطبيق
        setTimeout(() => showAd(), 500);
        
        // منع الإغلاق العرضي
        window.addEventListener('beforeunload', (e) => {
            if (!adCompleted && !redirectAttempted) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
        
        // معلومات المستخدم
        console.log('User:', tg.initDataUnsafe?.user);
    </script>
</body>
</html>
