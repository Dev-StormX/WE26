<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Redirect System</title>

<script src="https://telegram.org/js/telegram-web-app.js?62"></script>
<script src='//libtl.com/sdk.js' data-zone='10892924' data-sdk='show_10892924'></script>

<style>
body{
    font-family: system-ui;
    background: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.box{
    text-align:center;
    padding:25px;
}
.loader{
    width:45px;height:45px;
    border:4px solid #ccc;
    border-top:4px solid #2196f3;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}
.info{margin-top:15px;font-size:12px;word-break:break-all;}
</style>
</head>

<body>

<div class="box">
    <div class="loader"></div>
    <p id="msg">جاري التحميل...</p>
    <div class="info" id="info"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let redirected = false;
const ZONE_ID = "10892924";

/* =========================
   استخراج الرابط (قوي جدًا)
========================= */
function getTargetUrl() {

    const params = new URLSearchParams(window.location.search);

    let url =
        tg.initDataUnsafe?.start_param ||
        params.get("url") ||
        params.get("link") ||
        params.get("startapp");

    if (!url) return null;

    try {

        // base64 support
        if (url.startsWith("base64:")) {
            let b64 = url.replace("base64:", "").trim();

            b64 = b64.replace(/-/g, '+').replace(/_/g, '/');

            while (b64.length % 4) {
                b64 += "=";
            }

            url = decodeURIComponent(escape(atob(b64)));
        }

        // normal decode
        url = decodeURIComponent(url);

    } catch (e) {
        console.log("decode error", e);
    }

    // normalize protocol
    if (!url.match(/^(https?:\/\/|tg:\/\/|t\.me\/)/)) {
        url = "https://" + url;
    }

    return url;
}

const TARGET = getTargetUrl();

/* =========================
   إذا لا يوجد رابط → توقف
========================= */
if (!TARGET) {
    document.getElementById("msg").innerText =
        "⚠️ لا يوجد رابط للتحويل";
} else {

    document.getElementById("info").innerText = TARGET;

    /* =========================
       تحويل بعد الإعلان
    ========================= */
    function redirect() {
        if (redirected) return;
        redirected = true;

        tg.sendData(JSON.stringify({
            action: "redirect",
            target: TARGET
        }));

        window.location.href = TARGET;
    }

    /* =========================
       عرض الإعلان
    ========================= */
    function showAd() {

        if (typeof window[`show_${ZONE_ID}`] !== "function") {
            setTimeout(redirect, 1500);
            return;
        }

        window[`show_${ZONE_ID}`]({ type: "end" })
        .then(() => {
            setTimeout(redirect, 800);
        })
        .catch(() => {
            setTimeout(redirect, 2000);
        });
    }

    setTimeout(showAd, 1000);
}
</script>

</body>
</html>
