<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Continue</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10892924' data-sdk='show_10892924'></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#F7FAFD;
    --card:#F2F5FB;
    --accent:#BC0003;
    --text:#000;
    --muted:#444746;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',system-ui;
}

body{
    background:radial-gradient(circle at top,var(--card),var(--bg));
    color:var(--text);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    direction:rtl;
}

.box{
    background:#EDF1F5;
    padding:30px 24px;
    border-radius:24px;
    text-align:center;
    box-shadow:none;
    width:260px;
}

p{
    margin-top:16px;
    color:var(--muted);
    font-size:15px;
}

button{
    display:none;
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:999px;
    background:#5E74FE;
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

.loader{
    width:42px;
    height:42px;
    border:4px solid #e6e6e6;
    border-top:4px solid var(--accent);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="box">
    <div class="loader" id="loader"></div>
    <p id="text">جاري تحميل الإعلان...</p>
    <button id="btn">متابعة</button>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const ZONE_ID = "10892924";

/* =========================
   🔥 Base62 SYSTEM
========================= */

const BASE62 = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";

/* decode Base62 → string */
function decodeBase62(str){
    try{
        let num = 0n;

        for(let c of str){
            num = num * 62n + BigInt(BASE62.indexOf(c));
        }

        let bytes = [];
        while(num > 0n){
            bytes.unshift(Number(num & 255n));
            num = num >> 8n;
        }

        return new TextDecoder().decode(new Uint8Array(bytes));
    }catch(e){
        return null;
    }
}

/* =========================
   📥 Get Param
========================= */

const param = tg.initDataUnsafe?.start_param;

/* فك Base62 */
let target = param ? decodeBase62(param) : null;

/* =========================
   ❌ Validation
========================= */

if(!target || !target.startsWith("http")){
    document.getElementById("text").innerText = "❌ رابط غير صالح";
}

/* =========================
   🎬 Ad logic
========================= */

function showAd(){

    if(typeof window[`show_${ZONE_ID}`] !== "function"){
        showButton();
        return;
    }

    window[`show_${ZONE_ID}`]({ type:"end" })
    .then(showButton)
    .catch(showButton);
}

/* =========================
   🔘 Show button
========================= */

function showButton(){
    document.getElementById("loader").style.display = "none";
    document.getElementById("text").innerText = "اضغط للمتابعة";
    document.getElementById("btn").style.display = "inline-block";
}

/* =========================
   🚀 Redirect
========================= */

document.getElementById("btn").onclick = function(){

    if(!target) return;

    tg.openTelegramLink(target);

};

/* start */
setTimeout(showAd, 1000);

</script>

</body>
</html>
