<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
</style>
</head>

<body>

<div id="text">جاري التحويل...</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

function decode(data) {
    try {
        data = data.replace(/-/g, '+').replace(/_/g, '/');
        while (data.length % 4) data += "=";
        return atob(data);
    } catch {
        return null;
    }
}

const param = tg.initDataUnsafe?.start_param;

if (!param) {
    document.getElementById("text").innerText = "❌ لا يوجد رابط";
} else {

    const target = decode(param);

    if (!target || !target.startsWith("http")) {
        document.getElementById("text").innerText = "❌ رابط غير صالح";
    } else {

        setTimeout(() => {

            // ✅ افتح الرابط
            tg.openTelegramLink(target);

            // ❗ لا تغلق مباشرة
            // أعطه وقت كافي

            setTimeout(() => {
                tg.close();
            }, 1500); // ← هذا هو السر

        }, 1000);
    }
}
</script>

</body>
</html>
