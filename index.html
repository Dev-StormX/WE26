<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Redirect</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10892924' data-sdk='show_10892924'></script>

<style>
body{
    font-family: system-ui;
    background: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    text-align:center;
}
.loader{
    width:40px;height:40px;
    border:4px solid #ddd;
    border-top:4px solid #2196f3;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="box">
    <div class="loader"></div>
    <p id="text">جاري التحميل...</p>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let done = false;
const ZONE_ID = "10892924";

/* =========================
   فقط startapp (المهم)
========================= */
let data = tg.initDataUnsafe?.start_param;

if (!data) {
    document.getElementById("text").innerText =
        "⚠️ لا يوجد رابط للتحويل";
} else {

    let target = data;

    /* base64 decode */
    try {
        target = atob(target);
    } catch(e) {
        console.log("not base64");
    }

    function redirect() {
        if (done) return;
        done = true;
        window.location.href = target;
    }

    function showAd() {

        if (typeof window[`show_${ZONE_ID}`] !== "function") {
            setTimeout(redirect, 1500);
            return;
        }

        window[`show_${ZONE_ID}`]({ type: "end" })
        .then(() => setTimeout(redirect, 800))
        .catch(() => setTimeout(redirect, 1500));
    }

    setTimeout(showAd, 1000);
}
</script>

</body>
</html>
