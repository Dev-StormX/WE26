<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>رابط مختصر - شاهد الإعلان واستمر</title>
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    
    <!-- Monetag SDK - يجب تحميله قبل استخدامه -->
    <script src='//libtl.com/sdk.js' data-zone='10892924' data-sdk='show_10892924'></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 30px 20px;
            margin: 20px 0;
        }
        .loading {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-hint-color, #ccc);
            border-top: 4px solid var(--tg-theme-button-color, #3390ec);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { font-size: 18px; margin: 20px 0; }
        .hint { font-size: 14px; color: var(--tg-theme-hint-color, #8e8e8e); margin-top: 10px; }
        .button {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .retry-btn { background: #ff3b30; margin-top: 15px; }
        .success-box {
            background: rgba(52, 199, 89, 0.1);
            border: 1px solid #34c759;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }
        .error-box {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid #ff3b30;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }
        .preload-box {
            background: rgba(51, 144, 236, 0.1);
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
        }
        .ad-badge { background: #ff3b30; color: white; font-size: 12px; padding: 4px 8px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="waitingBox">
            <div class="ad-badge">⭐ شاهد الإعلان للمتابعة ⭐</div>
            <div class="loading" id="spinner"></div>
            <div class="message" id="message">🔍 جاري تجهيز الإعلان...</div>
            <div class="hint" id="hint">يجب مشاهدة الإعلان حتى النهاية للتحويل</div>
            <div class="preload-box" id="preloadStatus">⏳ يتم تحميل الإعلان مسبقاً...</div>
        </div>

        <div class="success-box" id="successBox">
            ✅ تم مشاهدة الإعلان بنجاح!<br>
            <small>جاري التحويل إلى الرابط المطلوب...</small>
        </div>

        <div class="error-box" id="errorBox">
            ❌ الإعلان غير متوفر حالياً<br>
            <small>سيتم تحويلك خلال 3 ثوانٍ</small>
            <div class="preload-box" style="margin-top: 10px;">🔄 جاري المحاولة مرة أخرى...</div>
        </div>
    </div>

    <script>
        (function() {
            // تهيئة Telegram WebApp
            const tg = window.Telegram.WebApp;
            tg.expand();
            
            // ✅ تفعيل زر الرجوع مع تأكيد الإغلاق
            tg.BackButton.show();
            tg.enableClosingConfirmation();
            
            // التعامل مع زر الرجوع
            tg.BackButton.onClick(() => {
                if (!adCompleted && !redirectAttempted) {
                    tg.showPopup({
                        title: "⚠️ تنبيه",
                        message: "لم تقم بمشاهدة الإعلان بعد. مشاهدة الإعلان ضرورية للتحويل إلى الرابط المطلوب.",
                        buttons: [
                            { id: "stay", type: "cancel", text: "مشاهدة الإعلان" },
                            { id: "exit", type: "destructive", text: "خروج" }
                        ]
                    }, (buttonId) => {
                        if (buttonId === "exit") tg.close();
                    });
                } else {
                    tg.close();
                }
            });
            
            // المتغيرات
            const ZONE_ID = '10892924';
            const TARGET_URL = "https://t.me/YourChannel"; // ⚠️ غيّر هذا إلى رابطك الحقيقي
            
            let adCompleted = false;
            let redirectAttempted = false;
            let isAdPreloaded = false;
            
            // العناصر
            const waitingBox = document.getElementById('waitingBox');
            const successBox = document.getElementById('successBox');
            const errorBox = document.getElementById('errorBox');
            const messageEl = document.getElementById('message');
            const hintEl = document.getElementById('hint');
            const spinner = document.getElementById('spinner');
            const preloadStatus = document.getElementById('preloadStatus');
            
            // الحصول على معرف المستخدم الفريد لـ ymid
            const userId = tg.initDataUnsafe?.user?.id || `guest_${Date.now()}`;
            
            // ✅ الخطوة 1: تحميل الإعلان مسبقاً (Preload)
            function preloadAd() {
                if (typeof window[`show_${ZONE_ID}`] !== 'function') {
                    preloadStatus.innerHTML = "⚠️ SDK غير متوفر، سيتم المحاولة مباشرة";
                    return false;
                }
                
                preloadStatus.innerHTML = "📥 جاري تحميل الإعلان مسبقاً...";
                
                // تحميل الإعلان مسبقاً حسب وثائق Monetag
                window[`show_${ZONE_ID}`]({ 
                    type: 'preload', 
                    ymid: userId 
                })
                .then(() => {
                    isAdPreloaded = true;
                    preloadStatus.innerHTML = "✅ الإعلان جاهز للعرض";
                    preloadStatus.style.background = "rgba(52, 199, 89, 0.2)";
                })
                .catch((error) => {
                    console.log('Preload failed:', error);
                    preloadStatus.innerHTML = "⚠️ سيتم تحميل الإعلان عند الطلب";
                });
                
                return true;
            }
            
            // ✅ الخطوة 2: عرض الإعلان (مع fallback)
            function showAd() {
                if (typeof window[`show_${ZONE_ID}`] !== 'function') {
                    messageEl.innerHTML = "⚠️ SDK غير متوفر";
                    hintEl.innerHTML = "سيتم التحويل خلال 3 ثوانٍ";
                    setTimeout(() => redirectToTarget(), 3000);
                    return;
                }
                
                messageEl.innerHTML = "📺 جاري تشغيل الإعلان...";
                hintEl.innerHTML = "⚠️ شاهد الإعلان حتى النهاية للتحويل";
                
                // ✅ عرض الإعلان حسب وثائق Monetag مع ymid
                window[`show_${ZONE_ID}`]({ 
                    ymid: userId,
                    requestVar: 'redirect_app'  // لتتبع مصدر الطلب
                })
                .then(() => {
                    // ✅ المستخدم شاهد الإعلان بالكامل
                    console.log('User watched the ad completely');
                    adCompleted = true;
                    
                    // إخفاء واجهة الانتظار
                    spinner.style.display = 'none';
                    waitingBox.style.display = 'none';
                    successBox.style.display = 'block';
                    
                    // إرسال إشعار إلى البوت
                    tg.sendData(JSON.stringify({
                        action: 'ad_completed',
                        timestamp: Date.now(),
                        user_id: userId,
                        zone_id: ZONE_ID
                    }));
                    
                    // التحويل بعد ثانية
                    setTimeout(() => redirectToTarget(), 1000);
                })
                .catch((error) => {
                    // ✅ فشل الإعلان أو تم تخطيه
                    console.log('Ad failed or was skipped:', error);
                    
                    // fallback: تحويل مباشر بعد 3 ثوانٍ
                    waitingBox.style.display = 'none';
                    errorBox.style.display = 'block';
                    
                    setTimeout(() => {
                        redirectToTarget();
                    }, 3000);
                });
            }
            
            function redirectToTarget() {
                if (redirectAttempted) return;
                redirectAttempted = true;
                
                tg.sendData(JSON.stringify({
                    action: 'redirect',
                    timestamp: Date.now(),
                    ad_completed: adCompleted,
                    user_id: userId
                }));
                
                window.location.href = TARGET_URL;
            }
            
            // ✅ إعادة المحاولة مع preload جديد
            function retryWithPreload() {
                errorBox.style.display = 'none';
                waitingBox.style.display = 'block';
                successBox.style.display = 'none';
                spinner.style.display = 'block';
                messageEl.innerHTML = "🔄 جاري تحضير الإعلان مجدداً...";
                hintEl.innerHTML = "سيتم تشغيل الإعلان فور تجهيزه";
                preloadStatus.innerHTML = "📥 جاري تحميل الإعلان مسبقاً...";
                preloadStatus.style.background = "rgba(51, 144, 236, 0.1)";
                isAdPreloaded = false;
                
                // إعادة preload ثم عرض الإعلان
                preloadAd();
                setTimeout(() => {
                    if (!adCompleted && !redirectAttempted) {
                        showAd();
                    }
                }, 1500);
            }
            
            // ربط زر إعادة المحاولة
            const retryBtn = document.getElementById('retryBtn');
            if (retryBtn) {
                retryBtn.addEventListener('click', retryWithPreload);
            } else {
                // إضافة الزر ديناميكياً إذا لم يكن موجوداً
                const btn = document.createElement('button');
                btn.className = 'button retry-btn';
                btn.id = 'retryBtn';
                btn.textContent = '🔄 إعادة المحاولة';
                btn.addEventListener('click', retryWithPreload);
                document.querySelector('.error-box')?.appendChild(btn);
            }
            
            // ✅ إعلام Telegram بأن التطبيق جاهز
            tg.ready();
            
            // ✅ بدء العملية: preload ثم عرض الإعلان
            preloadAd();
            
            setTimeout(() => {
                if (!adCompleted && !redirectAttempted) {
                    showAd();
                }
            }, 1000);
            
        })();
    </script>
</body>
</html>
