<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>رابط مختصر - شاهد الإعلان واستمر</title>
    <!-- 1. سكربت Telegram الرسمي -->
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
    <!-- 2. سكربت Monetag الإعلاني (تأكد من صحة الـ data-zone) -->
    <script src='//libtl.com/sdk.js' data-zone='10892924' data-sdk='show_10892924'></script>

    <style>
        /* (سيتم وضع نفس التنسيقات الجميلة هنا، يمكنك إضافتها لاحقاً) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { text-align: center; max-width: 400px; width: 100%; }
        .card { background: var(--tg-theme-secondary-bg-color); border-radius: 16px; padding: 30px 20px; margin: 20px 0; }
        .loading { width: 50px; height: 50px; border: 4px solid var(--tg-theme-hint-color); border-top: 4px solid var(--tg-theme-button-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { font-size: 18px; margin: 20px 0; }
        .button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 14px 28px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; transition: opacity 0.3s; }
        .retry-btn { background: #ff3b30; margin-top: 15px; }
        .success-box, .error-box { background: rgba(52, 199, 89, 0.1); border-radius: 12px; padding: 15px; margin: 20px 0; display: none; }
        .error-box { background: rgba(255, 59, 48, 0.1); }
        .ad-badge { background: #ff3b30; color: white; font-size: 12px; padding: 4px 8px; border-radius: 20px; display: inline-block; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="waitingBox">
            <div class="ad-badge">⭐ شاهد الإعلان للمتابرة ⭐</div>
            <div class="loading" id="spinner"></div>
            <div class="message" id="message">🔍 جاري تجهيز الإعلان...</div>
        </div>
        <div class="success-box" id="successBox">✅ تم مشاهدة الإعلان! جاري التحويل...</div>
        <div class="error-box" id="errorBox">⚠️ حدث خطأ في الإعلان، جاري التحويل كبديل...</div>
    </div>

    <script>
        // --- تهيئة Telegram WebApp ومنع الإغلاق العرضي ---
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation(); // طلب تأكيد قبل الإغلاق
        tg.ready(); // إعلام Telegram بأن التطبيق جاهز

        // --- المتغيرات الأساسية ---
        const ZONE_ID = '10892924';
        const TARGET_URL = "https://t.me/YourChannel"; // ⚠️ ⚠️ ⚠️ غيّر هذا إلى الرابط الذي تريد التحويل إليه ⚠️ ⚠️ ⚠️
        
        let adCompleted = false; // هل شاهد المستخدم الإعلان؟
        let redirectTriggered = false; // هل تم تنفيذ التحويل بالفعل؟

        // --- دوال مساعدة للواجهة ---
        const elements = {
            waitingBox: document.getElementById('waitingBox'),
            successBox: document.getElementById('successBox'),
            errorBox: document.getElementById('errorBox'),
            message: document.getElementById('message'),
            spinner: document.getElementById('spinner')
        };

        function setLoading(loading, errorMsg = null) {
            elements.waitingBox.style.display = loading ? 'block' : 'none';
            elements.successBox.style.display = 'none';
            elements.errorBox.style.display = errorMsg ? 'block' : 'none';
            if (errorMsg) elements.message.innerText = errorMsg;
        }

        // --- دالة التحويل النهائية ---
        function redirectToTarget() {
            if (redirectTriggered) return; // منع التكرار
            redirectTriggered = true;
            console.log(`Redirecting to: ${TARGET_URL}`);
            // إرسال آخر إشعار للبوت قبل التحويل
            tg.sendData(JSON.stringify({ action: 'redirect', timestamp: Date.now(), ad_completed: adCompleted }));
            // تنفيذ التحويل
            window.location.href = TARGET_URL;
        }

        // --- دالة عرض الإعلان (حسب وثائق Monetag) ---
        function showAd() {
            // 1. التأكد من أن دالة الإعلان موجودة
            if (typeof window[`show_${ZONE_ID}`] !== 'function') {
                console.error("Monetag SDK not loaded!");
                elements.message.innerText = "⚠️ عذراً، خدمة الإعلانات غير متوفرة. جاري التحويل...";
                setTimeout(redirectToTarget, 2000);
                return;
            }

            // 2. محاولة عرض الإعلان
            // استخدام type: 'end' هو الإعداد الافتراضي، نضيفه للتوضيح. الـ Promise تتحقق بعد انتهاء المستخدم من مشاهدة الإعلان [citation:2][citation:10].
            window[`show_${ZONE_ID}`]({ type: 'end' })
                .then(() => {
                    // ✅ هذا يعني أن المستخدم شاهد الإعلان بالكامل وحصل على المكافأة
                    console.log("Ad completed successfully!");
                    adCompleted = true;
                    setLoading(false); // إخفاء شاشة الانتظار
                    elements.successBox.style.display = 'block'; // إظهار رسالة النجاح
                    // التحويل إلى الرابط بعد ثانية واحدة (لإعطاء انطباع بسلاسة)
                    setTimeout(redirectToTarget, 1000);
                })
                .catch((error) => {
                    // ❌ فشل الإعلان: إما أن المستخدم أغلقه أو أنه غير متاح
                    console.error("Ad failed or was skipped:", error);
                    setLoading(false, "⚠️ لم يتم مشاهدة الإعلان بالكامل. جاري التحويل كبديل...");
                    elements.errorBox.style.display = 'block';
                    // التحويل بعد 3 ثوانٍ كحل بديل (Fallback) [citation:10]
                    setTimeout(redirectToTarget, 3000);
                });
        }

        // --- بدء تشغيل التطبيق: عرض الإعلان بعد 1 ثانية من تحميل كل شيء ---
        setTimeout(showAd, 1000);

        // --- (اختياري) التحكم في زر الرجوع ---
        if (tg.BackButton) {
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                if (!redirectTriggered) {
                    tg.showPopup({
                        title: "⚠️ تنبيه",
                        message: "لم تقم بمشاهدة الإعلان بعد. مشاهدة الإعلان ضرورية للتحويل.",
                        buttons: [{ type: "ok", text: "حسناً" }]
                    });
                } else {
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
