<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>رابط مختصر - شاهد الإعلان واستمر</title>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>

    <!-- Monetag -->
    <script src='//libtl.com/sdk.js' data-zone='10892924' data-sdk='show_10892924'></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; max-width: 400px; width: 100%; }
        .card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            padding: 30px 20px;
            margin: 20px 0;
        }
        .loading {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-hint-color);
            border-top: 4px solid var(--tg-theme-button-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .message { font-size: 18px; margin: 20px 0; }
        .ad-badge {
            background: #ff3b30;
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .info-box {
            background: rgba(51,144,236,0.1);
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
            font-size: 12px;
            word-break: break-all;
        }
        .success-box, .error-box {
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }
        .success-box { background: rgba(52,199,89,0.15); }
        .error-box { background: rgba(255,59,48,0.15); }
    </style>
</head>

<body>
<div class="container">

    <div class="card" id="waitingBox">
        <div class="ad-badge">⭐ شاهد الإعلان للمتابعة ⭐</div>
        <div class="loading"></div>
        <div class="message" id="message">🔍 جاري تجهيز الإعلان...</div>
        <div class="info-box" id="infoBox"></div>
    </div>

    <div class="success-box" id="successBox">✅ تم مشاهدة الإعلان! جاري التحويل...</div>
    <div class="error-box" id="errorBox">⚠️ حدث خطأ، جاري التحويل...</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let adCompleted = false;
let redirectTriggered = false;
const ZONE_ID = '10892924';

/* -----------------------------
   استخراج الرابط بشكل قوي
------------------------------*/
function getTargetUrl() {

    let urlParams = new URLSearchParams(window.location.search);

    let targetUrl =
        tg.initDataUnsafe?.start_param ||
        urlParams.get('url') ||
        urlParams.get('link') ||
        urlParams.get('startapp');

    if (!targetUrl) {
        return "https://t.me/YourChannel";
    }

    try {
        // Base64 support
        if (targetUrl.startsWith("base64:")) {
            targetUrl = atob(targetUrl.replace("base64:", ""));
        }

        // URL decode (حل المشكلة الأساسية عندك)
        targetUrl = decodeURIComponent(targetUrl);

    } catch (e) {
        console.warn("Decode error:", e);
    }

    // ضمان البروتوكول
    if (!targetUrl.match(/^(https?:\/\/|tg:\/\/|t\.me\/)/)) {
        targetUrl = "https://" + targetUrl;
    }

    return targetUrl;
}

const TARGET_URL = getTargetUrl();

document.getElementById("infoBox").innerHTML =
    "🔗 سيتم التحويل إلى:<br><strong>" +
    TARGET_URL.substring(0, 60) +
    (TARGET_URL.length > 60 ? "..." : "") +
    "</strong>";

/* -----------------------------
   التحويل
------------------------------*/
function redirectToTarget() {
    if (redirectTriggered) return;
    redirectTriggered = true;

    tg.sendData(JSON.stringify({
        action: "redirect",
        ad_completed: adCompleted,
        target: TARGET_URL
    }));

    window.location.href = TARGET_URL;
}

/* -----------------------------
   عرض الإعلان
------------------------------*/
function showAd() {

    if (typeof window[`show_${ZONE_ID}`] !== "function") {
        document.getElementById("message").innerText =
            "⚠️ الإعلانات غير متاحة، جاري التحويل...";
        setTimeout(redirectToTarget, 2000);
        return;
    }

    window[`show_${ZONE_ID}`]({ type: "end" })
        .then(() => {
            adCompleted = true;
            document.getElementById("successBox").style.display = "block";
            setTimeout(redirectToTarget, 1200);
        })
        .catch(() => {
            document.getElementById("errorBox").style.display = "block";
            setTimeout(redirectToTarget, 2500);
        });
}

setTimeout(showAd, 1200);

/* -----------------------------
   زر الرجوع
------------------------------*/
if (tg.BackButton) {
    tg.BackButton.show();

    tg.BackButton.onClick(() => {
        tg.showPopup({
            title: "تنبيه",
            message: "يجب مشاهدة الإعلان للمتابعة",
            buttons: [{ type: "ok" }]
        });
    });
}
</script>

</body>
</html>
