<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Redirect System</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background:#111;
    color:#fff;
}
.box{
    text-align:center;
}
.loader{
    width:40px;
    height:40px;
    border:4px solid #444;
    border-top:4px solid #00aaff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="box">
    <div class="loader"></div>
    <p id="text">جاري التحويل...</p>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

function getTarget() {

    let data = tg.initDataUnsafe?.start_param;

    if (!data) return null;

    try {
        // 1. restore Base64 URL-safe
        data = data.replace(/-/g, '+').replace(/_/g, '/');

        // 2. padding fix
        while (data.length % 4) {
            data += "=";
        }

        // 3. decode
        return atob(data);

    } catch (e) {
        console.log("decode error", e);
        return null;
    }
}

const target = getTarget();

if (!target) {

    document.getElementById("text").innerText =
        "⚠️ لا يوجد رابط للتحويل";

} else {

    // حماية: تأكد أنه رابط صحيح
    if (!target.startsWith("http")) {

        document.getElementById("text").innerText =
            "⚠️ رابط غير صالح";

    } else {

        // تأخير بسيط لتفادي منع Telegram WebView
        setTimeout(() => {
            window.location.href = target;
        }, 1200);

    }
}

</script>

</body>
</html>
